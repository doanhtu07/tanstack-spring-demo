# https://electric-sql.com/docs/guides/installation

name: 'electric_quickstart'

services:
  postgres:
    image: docker.io/postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    tmpfs:
      - /tmp # fast temp storage
    volumes:
      - pgdata:/var/lib/postgresql # persistent DB
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical # Enables logical replication in PostgreSQL (Required for Electric)
    healthcheck:
      test: [ 'CMD-SHELL', "pg_isready -U ${DB_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  electric:
    image: docker.io/electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      ELECTRIC_INSECURE: false
      ELECTRIC_SECRET: ${ELECTRIC_SECRET}
    ports:
      - "${ELECTRIC_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
