spring:
  profiles:
    active: ${SPRING_PROFILE:dev}

  application:
    name: openapi-server

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_JDBC_URL}

    # https://github.com/brettwooldridge/HikariCP
    hikari:
      minimum-idle: ${HIKARI_MINIMUM_IDLE:10}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      keepalive-time: ${HIKARI_KEEPALIVE_TIME:120000}

  jpa:
    hibernate:
      ddl-auto: none  # Hibernate will not manage schema; Liquibase handles it

    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Liquibase integration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-root.yaml

  # Mail integration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 3000
      mail.smtp.writetimeout: 5000

  # Spring Boot Admin integration
  boot:
    admin:
      client:
        url: ${ADMIN_MONITOR_URL}  # URL of your Admin Server
        username: ${ADMIN_MONITOR_USERNAME}
        password: ${ADMIN_MONITOR_PASSWORD}

        instance:
          service-base-url: ${SERVICE_BASE_URL:${RENDER_EXTERNAL_URL}}
          management-base-url: ${MANAGEMENT_BASE_URL:${RENDER_EXTERNAL_URL}}
          metadata:
            user.name: ${ACTUATOR_USERNAME}
            user.password: ${ACTUATOR_PASSWORD}

server:
  port: ${PORT}

  # Useful for reverse proxies (Spring will scope cookies appropriately)
  forward-headers-strategy: framework

  # JSESSIONID cookie configuration (But we pass these settings for SESSION and CSRF cookies as well)
  servlet:
    session:
      cookie:
        domain: ${SESSION_COOKIE_DOMAIN:}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}
        secure: ${SESSION_COOKIE_SECURE:false}
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}

logging:
  level:
    org:
      springframework:
        security: ${SPRING_SECURITY_LOG_LEVEL:info}

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all actuator endpoints

  endpoint:
    health:
      show-details: when_authorized
      roles: [ "ACTUATOR" ]

    env:
      show-values: when_authorized
      roles: [ "ACTUATOR" ]

    configprops:
      show-values: when_authorized
      roles: [ "ACTUATOR" ]

  info:
    env:
      enabled: true  # Enable the info endpoint with environment details

# MARK: Custom application properties

from-email:
  no-reply: ${MAIL_FROM_EMAIL_NO_REPLY}

electric:
  url: ${ELECTRIC_URL}
  secret: ${ELECTRIC_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
