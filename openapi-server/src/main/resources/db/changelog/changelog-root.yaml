databaseChangeLog:
  # ------------------------------------------------------------
  # Enable extensions (pgcrypto)
  # For PostgreSQL gen_random_uuid()
  # ------------------------------------------------------------

  - changeSet:
      id: enable-pgcrypto
      author: tudope
      dbms: postgresql
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS "pgcrypto";

  # ------------------------------------------------------------
  # Include other changelogs
  # ------------------------------------------------------------

  # Tables
  - include:
      file: changelog-tables/user.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-tables/authority.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-tables/spring_session.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-tables/spring_session_attributes.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-tables/todo.yaml
      relativeToChangelogFile: true

  # Indexes
  - include:
      file: changelog-indexes/authority.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-indexes/spring_session.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-indexes/spring_session_attributes.yaml
      relativeToChangelogFile: true
  - include:
      file: changelog-indexes/todo.yaml
      relativeToChangelogFile: true

  # Triggers
  - include:
      file: changelog-triggers/updated_at.yaml
      relativeToChangelogFile: true
